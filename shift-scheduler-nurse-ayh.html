<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางเวร</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap');

:root {
  --bg: #f5f6fa; --surface: #ffffff; --surface2: #eef0f7;
  --border: #d0d4e8; --text: #1a1d2e; --text-dim: #6b7099;
  --accent: #5c6bc0; --accent2: #3949ab; --header-bg: #ffffff;
  --pos1: #111111; --pos2: #e53935; --pos3: #8e24aa; --pos4: #388e3c; --pos5: #1565c0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Sarabun', sans-serif; min-height: 100vh; }

.app-header { background: var(--header-bg); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.app-title { font-family: 'Prompt', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--accent2); }
.month-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.month-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; }
.month-nav button:hover { background: var(--accent); color: white; }
.month-display { font-family: 'Prompt', sans-serif; font-weight: 600; font-size: 0.95rem; min-width: 150px; text-align: center; color: var(--accent2); }

.tabs { display: flex; gap: 4px; padding: 10px 20px 0; border-bottom: 1px solid var(--border); background: var(--header-bg); }
.tab { padding: 7px 16px; border-radius: 8px 8px 0 0; border: 1px solid transparent; border-bottom: none; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; background: transparent; color: var(--text-dim); }
.tab.active { background: var(--bg); border-color: var(--border); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }

.stamp-bar { background: var(--surface); border-bottom: 2px solid var(--border); padding: 8px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.stamp-bar-label { font-size: 11px; color: var(--text-dim); font-weight: 600; white-space: nowrap; }
.stamp-btns { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.sbtn { border: 1.5px solid var(--border); border-radius: 12px; padding: 3px 9px; cursor: pointer; font-size: 11px; font-family: 'Sarabun', sans-serif; font-weight: 700; background: var(--surface2); color: var(--text); display: inline-flex; align-items: center; gap: 3px; }
.sbtn:hover { border-color: var(--accent); }
.sbtn.active { background: var(--accent2); border-color: var(--accent2); color: white; transform: scale(1.06); }
.sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.stamp-cancel { background: #e53935; border: none; border-radius: 8px; color: white; padding: 4px 12px; cursor: pointer; font-size: 12px; font-family: 'Sarabun', sans-serif; font-weight: 600; display: none; }

.page { display: none; padding: 16px 20px; }
.page.active { display: block; }

.table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); }
table { border-collapse: collapse; min-width: 100%; font-size: 12px; }
th, td { border: 1px solid var(--border); padding: 0; text-align: center; vertical-align: middle; }
thead th { background: var(--surface2); padding: 6px 4px; font-size: 11px; color: var(--text-dim); white-space: nowrap; position: sticky; top: 0; z-index: 2; }
thead th.day-weekend { color: #e53935; }
thead th.day-holiday { background: #fff8e1 !important; color: #e65100 !important; }
thead th.name-col { left: 0; z-index: 3; background: var(--surface2); min-width: 100px; text-align: left; padding-left: 10px; }
td.name-cell { background: var(--surface); position: sticky; left: 0; z-index: 1; padding: 6px 10px; text-align: left; font-size: 12px; color: var(--text); white-space: nowrap; border-right: 2px solid var(--accent); }
td.shift-cell { min-width: 40px; height: 34px; cursor: pointer; }
td.shift-cell:hover { background: rgba(92,107,192,0.12) !important; }
td.shift-cell.weekend-col { background: rgba(239,83,80,0.05); }
td.shift-cell.holiday-col { background: rgba(255,224,130,0.3); }

.shift-display { display: flex; justify-content: center; align-items: center; gap: 1px; height: 100%; font-weight: 700; font-size: 12px; }
.shift-char { display: inline-block; line-height: 1; }
.pc-1 { color: var(--pos1); } .pc-2 { color: var(--pos2); } .pc-3 { color: var(--pos3); } .pc-4 { color: var(--pos4); } .pc-5 { color: var(--pos5); }

.pos-legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 8px 14px; border-top: 1px solid var(--border); font-size: 11px; }
.pos-legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; min-width: 300px; max-width: 360px; width: 90%; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
.modal-title { font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--accent2); }
.modal-info { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
.shift-toggles { display: flex; gap: 8px; margin-bottom: 14px; }
.shift-toggle { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-family: 'Sarabun', sans-serif; font-weight: 700; font-size: 13px; }
.shift-toggle.on { border-color: var(--accent2); color: var(--accent2); background: #e8eaf6; }
.pos-section { margin-bottom: 12px; }
.pos-section-title { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.pos-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.pos-label { width: 30px; font-weight: 700; font-size: 13px; }
.pos-dots { display: flex; gap: 6px; }
.pos-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.1s; }
.pos-dot:hover { transform: scale(1.2); }
.pos-dot.selected { border-color: #333; transform: scale(1.15); }
.pos-dot.p0 { background: #e0e0e0; } .pos-dot.p1 { background: var(--pos1); } .pos-dot.p2 { background: var(--pos2); } .pos-dot.p3 { background: var(--pos3); } .pos-dot.p4 { background: var(--pos4); } .pos-dot.p5 { background: var(--pos5); }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.btn { flex: 1; padding: 8px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 13px; font-weight: 600; }
.btn-primary { background: var(--accent); color: white; } .btn-danger { background: #e53935; color: white; } .btn-ghost { background: var(--surface2); color: var(--text-dim); }

.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.section-card h3 { font-family: 'Prompt', sans-serif; font-size: 13px; font-weight: 600; color: var(--accent2); margin-bottom: 12px; }
.person-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.person-tag { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; }
.person-tag button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; }
.person-tag button:hover { color: #e53935; }
.add-row { display: flex; gap: 8px; }
.add-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-family: 'Sarabun', sans-serif; font-size: 13px; outline: none; }
.add-row input:focus { border-color: var(--accent); }
.add-row button { background: var(--accent); border: none; border-radius: 8px; color: white; padding: 7px 14px; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; }

.summary-controls { display: flex; gap: 10px; margin-bottom: 14px; }
.summary-controls select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 8px; font-family: 'Sarabun', sans-serif; font-size: 13px; outline: none; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 12px; }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.summary-name { font-weight: 700; font-size: 14px; margin-bottom: 10px; }
.summary-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.summary-row:last-child { border-bottom: none; }
.count-badge { background: var(--surface2); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--text-dim); }
.day-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; flex-wrap: wrap; }
.day-num { width: 28px; color: var(--text-dim); font-weight: 600; }
.shift-group { display: flex; align-items: center; gap: 6px; background: var(--surface2); border-radius: 6px; padding: 3px 8px; }
.shift-group-label { font-size: 10px; color: var(--text-dim); }

.holiday-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.holiday-item { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; }
.holiday-item .hdate { color: #e65100; font-weight: 700; min-width: 80px; }
.holiday-item .hname { flex: 1; }
.holiday-item button { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; }
.holiday-item button:hover { color: #e53935; }
.holiday-add-form { display: flex; gap: 8px; flex-wrap: wrap; }
.holiday-add-form input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 10px; font-family: 'Sarabun', sans-serif; font-size: 13px; outline: none; }
.holiday-add-form input[type="date"] { width: 150px; }
.holiday-add-form input[type="text"] { flex: 1; min-width: 160px; }
.holiday-add-form input:focus { border-color: var(--accent); }
.holiday-add-form button { background: #f57c00; border: none; border-radius: 8px; color: white; padding: 7px 14px; cursor: pointer; font-size: 13px; font-family: 'Sarabun', sans-serif; font-weight: 700; }
.holiday-month-title { font-size: 11px; color: var(--text-dim); margin: 10px 0 6px; font-weight: 600; }

.toast { position: fixed; bottom: 20px; right: 20px; background: #2e7d32; color: white; padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.no-data { color: var(--text-dim); font-size: 13px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📋 ตารางเวร</div>
  <div class="month-nav">
    <button id="btnPrev">‹</button>
    <div class="month-display" id="monthDisplay"></div>
    <button id="btnNext">›</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="schedule">ตารางเวร</button>
  <button class="tab" data-tab="summary">สรุปเวร</button>
  <button class="tab" data-tab="holidays">วันหยุด</button>
  <button class="tab" data-tab="settings">ตั้งค่า</button>
</div>

<div class="stamp-bar">
  <span class="stamp-bar-label">🖊 แปะตรายาง:</span>
  <div class="stamp-btns" id="stampButtons"></div>
  <button class="stamp-cancel" id="stampCancel">✕ ยกเลิก</button>
</div>

<div class="page active" id="page-schedule">
  <div class="table-wrapper">
    <table id="scheduleTable"></table>
    <div class="pos-legend">
      <span class="pos-legend-item"><span class="legend-dot" style="background:var(--pos1)"></span>เวรตึก</span>
      <span class="pos-legend-item"><span class="legend-dot" style="background:var(--pos2)"></span>OT</span>
      <span class="pos-legend-item"><span class="legend-dot" style="background:var(--pos3)"></span>C2</span>
      <span class="pos-legend-item"><span class="legend-dot" style="background:var(--pos4)"></span>EMD</span>
      <span class="pos-legend-item"><span class="legend-dot" style="background:var(--pos5)"></span>EMS</span>
    </div>
  </div>
</div>

<div class="page" id="page-summary">
  <div class="summary-controls">
    <select id="summaryFilter">
      <option value="person">สรุปรายคน</option>
      <option value="daily">สรุปรายวัน</option>
    </select>
  </div>
  <div id="summaryContent"></div>
</div>

<div class="page" id="page-holidays">
  <div class="section-card">
    <h3>🎌 วันหยุดราชการ</h3>
    <div id="holidayList"></div>
    <div class="holiday-add-form">
      <input type="date" id="newHolidayDate">
      <input type="text" id="newHolidayName" placeholder="ชื่อวันหยุด เช่น วันสงกรานต์">
      <button id="btnAddHoliday">+ เพิ่ม</button>
    </div>
  </div>
</div>

<div class="page" id="page-settings">
  <div class="section-card">
    <h3>👤 รายชื่อพยาบาล / เจ้าหน้าที่</h3>
    <div class="person-list" id="personList"></div>
    <div class="add-row">
      <input type="text" id="newPersonName" placeholder="ชื่อ-นามสกุล">
      <button id="btnAddPerson">+ เพิ่ม</button>
    </div>
  </div>
  <div class="section-card">
    <h3>🎨 ความหมายของสี</h3>
    <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;">
      <div style="display:flex;align-items:center;gap:8px;"><span class="shift-char pc-1" style="font-size:18px;font-weight:700">●</span> เวรตึก (ดำ)</div>
      <div style="display:flex;align-items:center;gap:8px;"><span class="shift-char pc-2" style="font-size:18px;font-weight:700">●</span> OT (แดง)</div>
      <div style="display:flex;align-items:center;gap:8px;"><span class="shift-char pc-3" style="font-size:18px;font-weight:700">●</span> C2 (ม่วง)</div>
      <div style="display:flex;align-items:center;gap:8px;"><span class="shift-char pc-4" style="font-size:18px;font-weight:700">●</span> EMD (เขียว)</div>
      <div style="display:flex;align-items:center;gap:8px;"><span class="shift-char pc-5" style="font-size:18px;font-weight:700">●</span> EMS (ฟ้า)</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">เลือกเวร:</div>
    <div class="shift-toggles">
      <button class="shift-toggle" id="tog-ch">ช (เช้า)</button>
      <button class="shift-toggle" id="tog-ba">บ (บ่าย)</button>
      <button class="shift-toggle" id="tog-dk">ด (ดึก)</button>
    </div>
    <div class="pos-section" id="posSection"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnModalCancel">ยกเลิก</button>
      <button class="btn btn-danger" id="btnModalClear">ล้าง</button>
      <button class="btn btn-primary" id="btnModalSave">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var MONTHS_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
var DAYS_TH = ['อา','จ','อ','พ','พฤ','ศ','ส'];
var SHIFTS = ['ช','บ','ด'];
var POS_CLASS = [null,'pc-1','pc-2','pc-3','pc-4','pc-5'];
var POS_COLOR = ['#e0e0e0','#111111','#e53935','#8e24aa','#388e3c','#1565c0'];
var POS_LABELS = ['ไม่ระบุ','เวรตึก','OT','C2','EMD','EMS'];

var state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth(),
  persons: ['พยาบาล ก','พยาบาล ข','พยาบาล ค','พยาบาล ง'],
  data: {},
  holidays: []
};

function save() {
  try { localStorage.setItem('shiftApp2', JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    var s = localStorage.getItem('shiftApp2');
    if (s) {
      var p = JSON.parse(s);
      if (p.year) state.year = p.year;
      if (p.month !== undefined) state.month = p.month;
      if (p.persons) state.persons = p.persons;
      if (p.data) state.data = p.data;
      if (p.holidays) state.holidays = p.holidays;
    }
  } catch(e) {}
}

function mk(y,m) { return y+'-'+String(m+1).padStart(2,'0'); }
function daysIn(y,m) { return new Date(y,m+1,0).getDate(); }
function ds(y,m,d) { return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

function getCell(pi,d) {
  var k=mk(state.year,state.month);
  return (state.data[k]&&state.data[k][pi]&&state.data[k][pi][d])||{shifts:[],colors:{}};
}
function setCell(pi,d,val) {
  var k=mk(state.year,state.month);
  if(!state.data[k]) state.data[k]={};
  if(!state.data[k][pi]) state.data[k][pi]={};
  state.data[k][pi][d]=val;
  save();
}
function getHoliday(y,m,d) {
  var s2=ds(y,m,d);
  for(var i=0;i<state.holidays.length;i++) if(state.holidays[i].date===s2) return state.holidays[i];
  return null;
}
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}
function updateMonthDisplay() {
  document.getElementById('monthDisplay').textContent=MONTHS_TH[state.month]+' '+(state.year+543);
}

// STAMP
var stampMode=null;
function renderStampButtons() {
  var el=document.getElementById('stampButtons');
  var html='';
  for(var si=0;si<SHIFTS.length;si++) {
    var s=SHIFTS[si];
    for(var ci=1;ci<=5;ci++) {
      var isActive=stampMode&&stampMode.shift===s&&stampMode.color===ci;
      html+='<button class="sbtn'+(isActive?' active':'')+'" data-shift="'+s+'" data-color="'+ci+'">';
      html+='<span class="sdot" style="background:'+POS_COLOR[ci]+';border:1px solid rgba(0,0,0,0.2)"></span>';
      html+=s;
      if(ci>0) html+='<span style="font-size:9px">'+POS_LABELS[ci]+'</span>';
      html+='</button>';
    }
  }
  el.innerHTML=html;
  var btns=el.querySelectorAll('.sbtn');
  for(var i=0;i<btns.length;i++) {
    btns[i].addEventListener('click',function(){
      var shift=this.getAttribute('data-shift');
      var color=parseInt(this.getAttribute('data-color'));
      if(stampMode&&stampMode.shift===shift&&stampMode.color===color) { stampMode=null; }
      else { stampMode={shift:shift,color:color}; }
      document.getElementById('stampCancel').style.display=stampMode?'inline-block':'none';
      renderStampButtons();
    });
  }
}

// SCHEDULE
function renderSchedule() {
  var table=document.getElementById('scheduleTable');
  var y=state.year,m=state.month,days=daysIn(y,m);
  var html='<thead><tr><th class="name-col">ชื่อ</th>';
  for(var d=1;d<=days;d++) {
    var dow=new Date(y,m,d).getDay();
    var isWE=dow===0||dow===6;
    var hol=getHoliday(y,m,d);
    var cls=hol?'day-holiday':(isWE?'day-weekend':'');
    html+='<th class="'+cls+'">'+d+'<br><span style="font-size:9px">'+DAYS_TH[dow]+'</span>';
    if(hol) html+='<span style="font-size:8px;display:block">🎌</span>';
    html+='</th>';
  }
  html+='</tr></thead><tbody>';
  for(var pi=0;pi<state.persons.length;pi++) {
    html+='<tr><td class="name-cell">'+state.persons[pi]+'</td>';
    for(var d2=1;d2<=days;d2++) {
      var dow2=new Date(y,m,d2).getDay();
      var isWE2=dow2===0||dow2===6;
      var hol2=getHoliday(y,m,d2);
      var cell=getCell(pi,d2);
      var cellCls='shift-cell'+(hol2?' holiday-col':(isWE2?' weekend-col':''));
      var content='';
      if(cell.shifts&&cell.shifts.length>0) {
        content='<div class="shift-display">';
        for(var si2=0;si2<cell.shifts.length;si2++) {
          var sh=cell.shifts[si2];
          var co=cell.colors[sh]||0;
          content+='<span class="'+(co?'shift-char '+POS_CLASS[co]:'shift-char')+'">'+sh+'</span>';
        }
        content+='</div>';
      }
      html+='<td class="'+cellCls+'" data-pi="'+pi+'" data-d="'+d2+'">'+content+'</td>';
    }
    html+='</tr>';
  }
  html+='</tbody>';
  table.innerHTML=html;
  var cells=table.querySelectorAll('td.shift-cell');
  for(var i=0;i<cells.length;i++) {
    cells[i].addEventListener('click',function(){
      handleCell(parseInt(this.getAttribute('data-pi')),parseInt(this.getAttribute('data-d')));
    });
  }
}

function handleCell(pi,d) {
  if(!stampMode){openModal(pi,d);return;}
  var cell=getCell(pi,d);
  var shifts=cell.shifts.slice();
  var colors=Object.assign({},cell.colors);
  var s=stampMode.shift,c=stampMode.color;
  if(shifts.indexOf(s)>=0&&colors[s]===c) {
    shifts.splice(shifts.indexOf(s),1); delete colors[s];
  } else {
    if(shifts.indexOf(s)<0){shifts.push(s);shifts.sort(function(a,b){return SHIFTS.indexOf(a)-SHIFTS.indexOf(b);});}
    colors[s]=c;
  }
  setCell(pi,d,{shifts:shifts,colors:colors});
  renderSchedule();
}

// MODAL
var mState={pi:null,d:null,shifts:[],colors:{}};
function openModal(pi,d) {
  var cell=getCell(pi,d);
  mState.pi=pi; mState.d=d;
  mState.shifts=cell.shifts.slice();
  mState.colors=Object.assign({},cell.colors);
  var dow=new Date(state.year,state.month,d).getDay();
  document.getElementById('modalTitle').textContent=state.persons[pi];
  document.getElementById('modalInfo').textContent='วันที่ '+d+' '+MONTHS_TH[state.month]+' '+(state.year+543)+' ('+DAYS_TH[dow]+')';
  updateToggles(); renderPosSection();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function updateToggles() {
  var map={'ช':'tog-ch','บ':'tog-ba','ด':'tog-dk'};
  for(var s in map) {
    var btn=document.getElementById(map[s]);
    if(mState.shifts.indexOf(s)>=0) btn.classList.add('on');
    else btn.classList.remove('on');
  }
}
function toggleShift(s) {
  var idx=mState.shifts.indexOf(s);
  if(idx>=0){mState.shifts.splice(idx,1);delete mState.colors[s];}
  else{mState.shifts.push(s);mState.shifts.sort(function(a,b){return SHIFTS.indexOf(a)-SHIFTS.indexOf(b);});}
  updateToggles(); renderPosSection();
}
function renderPosSection() {
  var sec=document.getElementById('posSection');
  if(mState.shifts.length===0){sec.innerHTML='';return;}
  var html='<div class="pos-section-title">เลือกตำแหน่ง (สี) แต่ละเวร:</div>';
  for(var i=0;i<mState.shifts.length;i++) {
    var s=mState.shifts[i];
    var cur=mState.colors[s]||0;
    html+='<div class="pos-row"><span class="pos-label">'+s+'</span><div class="pos-dots">';
    for(var c=1;c<=5;c++) html+='<div class="pos-dot p'+c+(cur===c?' selected':'')+'" data-s="'+s+'" data-c="'+c+'" title="'+POS_LABELS[c]+'"></div>';
    html+='</div></div>';
  }
  sec.innerHTML=html;
  var dots=sec.querySelectorAll('.pos-dot');
  for(var j=0;j<dots.length;j++) {
    dots[j].addEventListener('click',function(){
      mState.colors[this.getAttribute('data-s')]=parseInt(this.getAttribute('data-c'));
      renderPosSection();
    });
  }
}

// SUMMARY
function renderSummary() {
  var mode=document.getElementById('summaryFilter').value;
  var el=document.getElementById('summaryContent');
  if(mode==='person') renderPersonSummary(el); else renderDailySummary(el);
}
function renderPersonSummary(el) {
  if(state.persons.length===0){el.innerHTML='<div class="no-data">ยังไม่มีรายชื่อ</div>';return;}
  var y=state.year,m=state.month,days=daysIn(y,m);
  var html='<div class="summary-grid">';
  for(var pi=0;pi<state.persons.length;pi++) {
    var counts={};
    for(var si=0;si<SHIFTS.length;si++) for(var ci=0;ci<=5;ci++) counts[SHIFTS[si]+'_'+ci]=0;
    for(var d=1;d<=days;d++) {
      var cell=getCell(pi,d);
      for(var si2=0;si2<cell.shifts.length;si2++) {
        var sh=cell.shifts[si2]; counts[sh+'_'+(cell.colors[sh]||0)]++;
      }
    }
    html+='<div class="summary-card"><div class="summary-name">'+state.persons[pi]+'</div>';
    for(var si3=0;si3<SHIFTS.length;si3++) {
      var s=SHIFTS[si3];
      var sName=s==='ช'?'เช้า':s==='บ'?'บ่าย':'ดึก';
      var total=0,detail='';
      for(var ci2=0;ci2<=5;ci2++) {
        var n=counts[s+'_'+ci2];
        if(n>0){total+=n;detail+='<span style="margin-right:6px;font-size:11px"><span class="'+(ci2?'shift-char '+POS_CLASS[ci2]:'shift-char')+'">'+s+'</span> '+POS_LABELS[ci2]+': '+n+'</span>';}
      }
      if(total>0) {
        html+='<div class="summary-row"><span>'+s+' '+sName+'</span><span class="count-badge">'+total+' เวร</span></div>';
        if(detail) html+='<div style="padding:2px 0 6px 12px;font-size:11px;color:var(--text-dim)">'+detail+'</div>';
      }
    }
    html+='</div>';
  }
  html+='</div>'; el.innerHTML=html;
}
function renderDailySummary(el) {
  var y=state.year,m=state.month,days=daysIn(y,m);
  var html='<div class="section-card"><div style="font-family:Prompt,sans-serif;font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:10px;">สรุปรายวัน — '+MONTHS_TH[m]+' '+(y+543)+'</div>';
  for(var d=1;d<=days;d++) {
    var dow=new Date(y,m,d).getDay();
    var isWE=dow===0||dow===6;
    var sc={'ช':[],'บ':[],'ด':[]};
    for(var pi=0;pi<state.persons.length;pi++) {
      var cell=getCell(pi,d);
      for(var si=0;si<cell.shifts.length;si++) {
        var sh=cell.shifts[si];
        if(sc[sh]) sc[sh].push({name:state.persons[pi],color:cell.colors[sh]||0});
      }
    }
    html+='<div class="day-row"><span class="day-num" style="'+(isWE?'color:#e53935':'')+'">'+ d+'</span><span style="font-size:10px;color:var(--text-dim);width:22px">'+DAYS_TH[dow]+'</span>';
    for(var si2=0;si2<SHIFTS.length;si2++) {
      var s=SHIFTS[si2],arr=sc[s];
      var sName=s==='ช'?'เช้า':s==='บ'?'บ่าย':'ดึก';
      html+='<span class="shift-group"><span class="shift-group-label">'+sName+'</span><span style="font-weight:700;font-size:12px;color:'+(arr.length>0?'var(--text)':'var(--text-dim)')+'">'+arr.length+'</span>';
      for(var ai=0;ai<arr.length;ai++) {
        html+='<span class="'+(arr[ai].color?'shift-char '+POS_CLASS[arr[ai].color]:'shift-char')+'" style="font-size:10px;margin-left:2px" title="'+arr[ai].name+'">'+arr[ai].name.slice(0,2)+'</span>';
      }
      html+='</span>';
    }
    html+='</div>';
  }
  html+='</div>'; el.innerHTML=html;
}

// PERSONS
function renderPersonList() {
  var el=document.getElementById('personList');
  if(state.persons.length===0){el.innerHTML='<span style="color:var(--text-dim);font-size:12px">ยังไม่มีรายชื่อ</span>';return;}
  var html='';
  for(var i=0;i<state.persons.length;i++) html+='<span class="person-tag">'+state.persons[i]+'<button data-i="'+i+'">×</button></span>';
  el.innerHTML=html;
  var btns=el.querySelectorAll('button');
  for(var j=0;j<btns.length;j++) {
    btns[j].addEventListener('click',function(){
      var idx=parseInt(this.getAttribute('data-i'));
      if(confirm('ลบ "'+state.persons[idx]+'" ออกจากรายชื่อ?')){
        state.persons.splice(idx,1); save(); renderPersonList(); renderSchedule();
      }
    });
  }
}

// HOLIDAYS
function renderHolidayList() {
  var el=document.getElementById('holidayList');
  if(!state.holidays||state.holidays.length===0){el.innerHTML='<div style="color:var(--text-dim);font-size:12px;margin-bottom:12px">ยังไม่มีวันหยุดราชการ</div>';return;}
  var sorted=state.holidays.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  var html='<div class="holiday-list">';
  for(var i=0;i<sorted.length;i++) {
    var h=sorted[i];
    var parts=h.date.split('-');
    var dow=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2])).getDay();
    html+='<div class="holiday-item"><span class="hdate">'+parseInt(parts[2])+' '+MONTHS_TH[parseInt(parts[1])-1].slice(0,3)+' ('+DAYS_TH[dow]+')</span><span class="hname">'+h.name+'</span><button data-date="'+h.date+'">×</button></div>';
  }
  html+='</div>'; el.innerHTML=html;
  var btns=el.querySelectorAll('button');
  for(var j=0;j<btns.length;j++) {
    btns[j].addEventListener('click',function(){
      var date=this.getAttribute('data-date');
      state.holidays=state.holidays.filter(function(h){return h.date!==date;});
      save(); renderHolidayList(); renderSchedule();
    });
  }
}

// TABS
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-tab')===name);});
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  if(name==='summary') renderSummary();
  if(name==='settings') renderPersonList();
  if(name==='holidays') renderHolidayList();
}

// EVENTS
document.getElementById('btnPrev').addEventListener('click',function(){
  state.month--; if(state.month<0){state.month=11;state.year--;}
  updateMonthDisplay(); renderSchedule(); save();
});
document.getElementById('btnNext').addEventListener('click',function(){
  state.month++; if(state.month>11){state.month=0;state.year++;}
  updateMonthDisplay(); renderSchedule(); save();
});
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){switchTab(this.getAttribute('data-tab'));});
});
document.getElementById('stampCancel').addEventListener('click',function(){
  stampMode=null; this.style.display='none'; renderStampButtons();
});
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('tog-ch').addEventListener('click',function(){toggleShift('ช');});
document.getElementById('tog-ba').addEventListener('click',function(){toggleShift('บ');});
document.getElementById('tog-dk').addEventListener('click',function(){toggleShift('ด');});
document.getElementById('btnModalCancel').addEventListener('click',closeModal);
document.getElementById('btnModalClear').addEventListener('click',function(){
  setCell(mState.pi,mState.d,{shifts:[],colors:{}}); renderSchedule(); closeModal();
});
document.getElementById('btnModalSave').addEventListener('click',function(){
  setCell(mState.pi,mState.d,{shifts:mState.shifts.slice(),colors:Object.assign({},mState.colors)});
  renderSchedule(); closeModal(); showToast('บันทึกแล้ว ✓');
});
document.getElementById('summaryFilter').addEventListener('change',renderSummary);
document.getElementById('btnAddPerson').addEventListener('click',function(){
  var inp=document.getElementById('newPersonName');
  var name=inp.value.trim(); if(!name) return;
  state.persons.push(name); inp.value='';
  save(); renderPersonList(); renderSchedule(); showToast('เพิ่ม "'+name+'" แล้ว');
});
document.getElementById('newPersonName').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btnAddPerson').click();});
document.getElementById('btnAddHoliday').addEventListener('click',function(){
  var dateVal=document.getElementById('newHolidayDate').value;
  var nameVal=document.getElementById('newHolidayName').value.trim();
  if(!dateVal){showToast('กรุณาเลือกวันที่');return;}
  if(!nameVal){showToast('กรุณาระบุชื่อวันหยุด');return;}
  for(var i=0;i<state.holidays.length;i++) if(state.holidays[i].date===dateVal){showToast('วันนี้มีวันหยุดอยู่แล้ว');return;}
  state.holidays.push({date:dateVal,name:nameVal});
  document.getElementById('newHolidayDate').value='';
  document.getElementById('newHolidayName').value='';
  save(); renderHolidayList(); renderSchedule(); showToast('เพิ่มวันหยุด "'+nameVal+'" แล้ว 🎌');
});
document.getElementById('newHolidayName').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('btnAddHoliday').click();});

// START
load();
updateMonthDisplay();
renderSchedule();
renderPersonList();
renderStampButtons();
</script>
</body>
</html>
